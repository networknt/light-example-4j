<!DOCTYPE html>
<html>
<head>
    <title>Light GenAI Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        #chat-log { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .message { margin-bottom: 5px; }
        .user { color: blue; }
        .assistant { color: green; }
        .system { color: gray; font-style: italic; }
        #controls { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Light GenAI Chat</h1>
    
    <div id="controls">
        <label>User ID: <input type="text" id="userId" value="user1"></label>
        <label>Model: <input type="text" id="model" value="qwen3:14b"></label>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()" disabled id="disconnectBtn">Disconnect</button>
    </div>

    <div id="chat-log"></div>

    <div id="input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." style="width: 70%;" disabled>
        <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        let ws;
        let currentAssistantMsgDiv = null;
        const chatLog = document.getElementById('chat-log');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        function connect() {
            const userId = document.getElementById('userId').value;
            const model = document.getElementById('model').value;
            const sessionId = sessionStorage.getItem('sessionId');
            
            // Version: 1.0.4 - Robust Session and Streaming
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            let url = `${protocol}//${window.location.host}/chat?userId=${encodeURIComponent(userId)}&model=${encodeURIComponent(model)}`;
            if (sessionId) {
                url += `&sessionId=${sessionId}`;
            }
            console.log("Connecting to:", url);
            ws = new WebSocket(url);

            ws.onopen = () => {
                log('System', 'Connected to chat server.');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                disconnectBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = event.data;
                console.log("Message:", data);
                
                try {
                    // Check if it represents a JSON session message
                    if (data.includes('"type": "session"') || data.includes('"type":"session"')) {
                        const json = JSON.parse(data);
                        if (json.type === 'session') {
                            sessionStorage.setItem('sessionId', json.sessionId);
                            log('System', 'Session initialized: ' + json.sessionId);
                            return;
                        }
                    }
                } catch (e) {
                    console.error("JSON parse error for potential session message:", e);
                }

                // If we don't have a current assistant message div, create one
                if (!currentAssistantMsgDiv || currentAssistantMsgDiv.parentElement === null) {
                    currentAssistantMsgDiv = createMessageDiv('Assistant');
                }
                
                // Append chunk to the div
                const textNode = document.createTextNode(data);
                currentAssistantMsgDiv.appendChild(textNode);
                chatLog.scrollTop = chatLog.scrollHeight;
            };

            ws.onclose = () => {
                log('System', 'Disconnected.');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                disconnectBtn.disabled = true;
                currentAssistantMsgDiv = null;
            };

            ws.onerror = (error) => {
                log('System', 'Error encountered. Check console.');
                console.error(error);
            };
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function sendMessage() {
            const text = messageInput.value;
            if (text && ws) {
                log('User', text);
                ws.send(text);
                messageInput.value = '';
                // Reset assistant div for next turn
                currentAssistantMsgDiv = null;
            }
        }

        function createMessageDiv(role) {
            console.log("createMessageDiv called for role:", role);
            const div = document.createElement('div');
            div.className = 'message ' + role.toLowerCase();
            div.innerHTML = `<strong>${role}:</strong> `;
            chatLog.appendChild(div);
            return div;
        }

        function log(role, text) {
            const div = createMessageDiv(role);
            div.appendChild(document.createTextNode(text));
            chatLog.scrollTop = chatLog.scrollHeight;
            return div;
        }

        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
